<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f6f9;
        }
        .container {
            margin-top: 40px;
            background: white;
            padding: 30px;
            display: inline-block;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        img {
            width: 300px;
            border-radius: 8px;
        }
        button {
            padding: 10px 15px;
            margin: 10px;
            border: none;
            background-color: #2c3e50;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #34495e;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Prediction Result</h2>

    {% if image_url %}
        <img src="{{ image_url }}">
    {% endif %}

    <h3>Breed: {{ breed }}</h3>
    <p>Confidence: {{ confidence }}%</p>

    <br>

    <a href="/read"><button>Read PDF</button></a>
    <a href="/download"><button>Download PDF</button></a>
    <a href="/skip"><button>Skip</button></a>
</div>

</body>
</html>
