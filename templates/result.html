<!DOCTYPE html>
<html>
<head>
    <title>Prediction Result</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:12px;
            text-align:center;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
            width:400px;
        }

        img{
            width:250px;
            border-radius:10px;
        }

        h2{
            margin-top:15px;
        }

        .btn{
            display:inline-block;
            margin:10px;
            padding:10px 18px;
            background:#2c3e50;
            color:white;
            text-decoration:none;
            border-radius:6px;
        }

        .btn:hover{
            background:#1a252f;
        }
    </style>
</head>

<body>

<div class="card">

    <img src="{{ url_for('static', filename='uploads/' + image_file) }}">

    <h2>Prediction Result</h2>

    <p><strong>Breed:</strong> {{ breed }}</p>
    <p><strong>Confidence:</strong> {{ confidence }}%</p>

    <br>

    <a href="/read_pdf" class="btn">Read PDF</a>

    <a href="/download_pdf" class="btn">Download PDF</a>

    <a href="/" class="btn">Skip</a>

</div>

</body>
</html>
